<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 520" role="img" aria-labelledby="title desc">
  <title id="title">INSIDE LVMH</title>
  <desc id="desc">Logo INSIDE LVMH</desc>
  <rect width="1024" height="520" fill="#ffffff"/>
  <defs>
    <linearGradient id="insideGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d5c5b1"/>
      <stop offset="28%" stop-color="#b69b7d"/>
      <stop offset="52%" stop-color="#efe4d2"/>
      <stop offset="76%" stop-color="#8b6a49"/>
      <stop offset="100%" stop-color="#ccb89a"/>
    </linearGradient>
    <clipPath id="insideText">
      <text x="50%" y="240" text-anchor="middle" font-size="250" font-weight="800" font-family="Arial Black, Arial, Helvetica, sans-serif" letter-spacing="12">
        INSIDE
      </text>
    </clipPath>
  </defs>

  <g clip-path="url(#insideText)">
    <rect width="1024" height="320" fill="url(#insideGradient)"/>
    <circle cx="190" cy="100" r="95" fill="#9f2f24" opacity="0.8"/>
    <circle cx="355" cy="145" r="120" fill="#e7d2b7" opacity="0.85"/>
    <circle cx="535" cy="115" r="95" fill="#b48c60" opacity="0.75"/>
    <circle cx="740" cy="130" r="110" fill="#302828" opacity="0.72"/>
    <circle cx="900" cy="105" r="95" fill="#d8c09a" opacity="0.9"/>
    <rect x="0" y="205" width="1024" height="120" fill="#d4b791" opacity="0.42"/>
  </g>

  <text x="50%" y="455" text-anchor="middle" font-size="145" font-family="Georgia, 'Times New Roman', serif" fill="#0f0f0f" letter-spacing="2">
    LVMH
  </text>
</svg>
